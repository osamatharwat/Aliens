<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aliens Space | Auth</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; background: linear-gradient(135deg, rgba(57, 255, 20, 0.08), rgba(71, 199, 255, 0.05)); position: relative; overflow: hidden; }
    .auth-hero::before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 20% 50%, rgba(57, 255, 20, 0.1), transparent 50%), radial-gradient(circle at 80% 80%, rgba(71, 199, 255, 0.1), transparent 50%); pointer-events: none; z-index: 0; }
    .auth-wrapper { position: relative; z-index: 1; width: 100%; max-width: 500px; }
    .auth-header { text-align: center; margin-bottom: 40px; animation: slideDown 0.6s ease; }
    .auth-header .logo-large { font-size: 4rem; margin-bottom: 12px; display: inline-block; animation: float 3s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(57, 255, 20, 0.3)); }
    .auth-header h1 { font-size: 2.2rem; margin-bottom: 8px; color: var(--text-strong); font-weight: 900; }
    .auth-header p { color: var(--muted); font-size: 0.95rem; letter-spacing: 0.5px; }
    .auth-box { border: 1px solid var(--line); border-radius: 28px; background: linear-gradient(180deg, rgba(14, 22, 37, 0.85), rgba(6, 10, 17, 0.95)); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 36px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 40px rgba(57, 255, 20, 0.05); animation: slideUp 0.6s ease; position: relative; }
    .auth-box::before { content: ""; position: absolute; inset: 0; border-radius: 28px; background: radial-gradient(circle at 0% 0%, rgba(57, 255, 20, 0.05), transparent 70%); pointer-events: none; }
    .auth-tabs { display: flex; gap: 12px; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--line); }
    .tab-btn { flex: 1; padding: 12px 16px; border: 1px solid transparent; border-radius: 14px; background: rgba(255, 255, 255, 0.04); color: var(--muted); font-weight: 700; cursor: pointer; transition: all var(--transition); font-size: 0.95rem; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .tab-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text); transform: translateY(-1px); }
    .tab-btn.active { background: linear-gradient(135deg, rgba(57, 255, 20, 0.2), rgba(71, 199, 255, 0.12)); border: 1px solid var(--line-strong); color: var(--accent); box-shadow: 0 8px 24px rgba(57, 255, 20, 0.12); }
    .auth-form { display: none; animation: fadeIn 0.4s ease; position: relative; z-index: 1; }
    .auth-form.active-form { display: block; }
    .auth-form h2 { font-size: 1.6rem; margin-bottom: 28px; color: var(--text-strong); text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .input-group { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 14px 16px; border: 1.5px solid var(--line); border-radius: 14px; background: rgba(255, 255, 255, 0.02); transition: all var(--transition); }
    .input-group:focus-within { border-color: var(--accent); background: rgba(57, 255, 20, 0.06); box-shadow: 0 0 20px rgba(57, 255, 20, 0.12), inset 0 0 0 1px rgba(57, 255, 20, 0.1); }
    .input-group i { color: var(--accent); font-size: 1.15rem; min-width: 20px; text-align: center; transition: transform var(--transition); }
    .input-group:focus-within i { transform: scale(1.1); }
    .input-group input, .input-group .file-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 0.95rem; outline: none; font-family: inherit; }
    .input-group input::placeholder { color: var(--muted-2); }
    .input-group input[type="file"]::file-selector-button { background: linear-gradient(135deg, rgba(57, 255, 20, 0.15), rgba(71, 199, 255, 0.1)); border: 1px solid var(--line-strong); color: var(--accent); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: all var(--transition); }
    .input-group input[type="file"]::file-selector-button:hover { background: linear-gradient(135deg, rgba(57, 255, 20, 0.25), rgba(71, 199, 255, 0.15)); transform: scale(1.02); }
    .password-toggle { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px 8px; font-size: 1rem; transition: all var(--transition); display: flex; align-items: center; justify-content: center; }
    .password-toggle:hover { color: var(--accent); transform: scale(1.1); }
    .auth-submit { width: 100%; padding: 14px; margin-top: 8px; border: none; border-radius: 14px; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #000; font-weight: 800; font-size: 1rem; cursor: pointer; transition: all var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden; }
    .auth-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(57, 255, 20, 0.4); }
    .auth-msg { margin-top: 16px; padding: 14px 16px; border-radius: 12px; font-size: 0.9rem; line-height: 1.6; text-align: center; display: none; animation: slideUp 0.3s ease; border-left: 4px solid; }
    .auth-msg.show { display: block; }
    .auth-msg.error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border-color: rgba(239, 68, 68, 0.5); }
    .auth-msg.success { background: rgba(34, 197, 94, 0.15); color: #86efac; border-color: rgba(34, 197, 94, 0.5); }
    .auth-msg.warning { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border-color: rgba(245, 158, 11, 0.5); }
    .auth-divider { display: flex; align-items: center; gap: 12px; margin: 28px 0; color: var(--muted); font-size: 0.85rem; font-weight: 600; }
    .auth-divider::before, .auth-divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }
    .auth-footer { text-align: center; margin-top: 20px; color: var(--muted); font-size: 0.9rem; }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 700; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @media (max-width: 560px) { .auth-hero { padding: 30px 16px; } .auth-box { padding: 24px; border-radius: 20px; } .auth-header .logo-large { font-size: 3rem; } .auth-header h1 { font-size: 1.6rem; } .tab-btn { padding: 10px 12px; font-size: 0.85rem; border-radius: 12px; } .tab-btn i { display: none; } .auth-form h2 { font-size: 1.3rem; margin-bottom: 20px; } }
  </style>
</head>
<body data-page="auth">
  <div id="particles-js"></div>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo"><span class="ufo-icon">🛸</span> ALIENS</a>
      <nav class="nav-links" id="siteNavLinks"></nav>
      <div class="nav-links" id="siteNavActions"></div>
    </div>
  </header>
  <main class="auth-hero">
    <div class="auth-wrapper">
      <div class="auth-header" data-aos="fade-down">
        <div class="logo-large">👽</div>
        <h1 data-i18n="auth_welcome">Welcome</h1>
        <p data-i18n="auth_sub">Be part of the ALIENS family</p>
      </div>

      <div class="auth-box" data-aos="zoom-in" data-aos-delay="100">
        <div class="auth-tabs">
          <button class="tab-btn active" type="button" id="loginTabBtn" onclick="window.switchTab('login')" data-i18n="tab_login"><i class="fa-solid fa-sign-in-alt"></i> Login</button>
          <button class="tab-btn" type="button" id="signupTabBtn" onclick="window.switchTab('signup')" data-i18n="tab_signup"><i class="fa-solid fa-user-plus"></i> Sign up</button>
        </div>

        <form id="loginForm" class="auth-form active-form" onsubmit="window.loginAction(event)">
          <h2 data-i18n="login_title"><i class="fa-solid fa-rocket"></i> Welcome Back</h2>
          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="text" id="loginId" data-i18n="ph_email" placeholder="Email or Username" autocomplete="username" required>
          </div>
          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="loginPassword" data-i18n="ph_pass" placeholder="Password" autocomplete="current-password" required>
            <button type="button" class="password-toggle" onclick="window.togglePasswordVisibility('loginPassword')"><i class="fa-solid fa-eye"></i></button>
          </div>
          <div style="text-align: left; margin: -6px 0 16px 5px;">
            <a href="javascript:void(0)" onclick="window.resetPasswordAction()" style="color: var(--accent); font-size: 0.85rem; font-weight: bold; text-decoration: none;" data-i18n="forgot_pass">Forgot Password?</a>
          </div>
          <button type="submit" class="cta-btn primary-btn auth-submit" data-i18n="btn_login"><i class="fa-solid fa-arrow-right"></i> Launch 🚀</button>
          <p class="auth-msg" id="loginMsg"></p>
          <div class="auth-divider" data-i18n="new_here">New here?</div>
          <div class="auth-footer">
            <button type="button" class="nav-link" onclick="window.switchTab('signup')" style="width: 100%; border: 1px solid var(--line-strong); background: rgba(255,255,255,0.02); justify-content: center;" data-i18n="btn_create"><i class="fa-solid fa-user-plus"></i> Create new account</button>
          </div>
        </form>

        <form id="signupForm" class="auth-form">
          <h2 data-i18n="signup_title"><i class="fa-solid fa-star"></i> Join the Familia</h2>
          <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="signupName" data-i18n="ph_name" placeholder="Full Name" autocomplete="name" required>
          </div>
          <div class="input-group">
            <i class="fa-solid fa-at"></i>
            <input type="text" id="signupUsername" data-i18n="ph_user" placeholder="Username (Letters & numbers)" pattern="[a-zA-Z0-9_]+" autocomplete="username" required>
          </div>
          <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="signupEmail" data-i18n="ph_email_su" placeholder="Email Address" autocomplete="email" required>
          </div>
          <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signupPassword" data-i18n="ph_pass_su" placeholder="Password (6+ chars)" autocomplete="new-password" minlength="6" required>
            <button type="button" class="password-toggle" onclick="window.togglePasswordVisibility('signupPassword')"><i class="fa-solid fa-eye"></i></button>
          </div>
          <div class="input-group">
            <i class="fa-solid fa-image"></i>
            <input type="file" id="signupAvatar" accept="image/*" class="file-input">
          </div>
          <div class="input-group">
            <i class="fa-solid fa-gift"></i>
            <input type="text" id="signupPromo" data-i18n="ph_promo" placeholder="Promo Code (Optional)">
          </div>
          <button type="submit" class="cta-btn primary-btn auth-submit" data-i18n="btn_signup"><i class="fa-solid fa-check"></i> Create Account 📝</button>
          <p class="auth-msg" id="signupMsg"></p>
          <div class="auth-divider" data-i18n="have_acc">Already have an account?</div>
          <div class="auth-footer">
            <button type="button" class="nav-link" onclick="window.switchTab('login')" style="width: 100%; border: 1px solid var(--line-strong); background: rgba(255,255,255,0.02); justify-content: center;" data-i18n="btn_to_login"><i class="fa-solid fa-sign-in-alt"></i> Login</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="core.js"></script>
  <script src="enhancements.js"></script>
  <script src="app.js"></script>
  <script>
    AOS.init({ duration: 700, once: true, offset: 80 });
    window.switchTab = function(tab) {
      const loginForm = document.getElementById('loginForm');
      const signupForm = document.getElementById('signupForm');
      const loginTab = document.getElementById('loginTabBtn');
      const signupTab = document.getElementById('signupTabBtn');
      if (tab === 'login') {
        loginForm.classList.add('active-form'); signupForm.classList.remove('active-form');
        loginTab.classList.add('active'); signupTab.classList.remove('active');
      } else {
        signupForm.classList.add('active-form'); loginForm.classList.remove('active-form');
        signupTab.classList.add('active'); loginTab.classList.remove('active');
      }
    };
    window.togglePasswordVisibility = function(inputId) {
      const input = document.getElementById(inputId);
      const btn = event.target.closest('button');
      if (input.type === 'password') { input.type = 'text'; btn.innerHTML = '<i class="fa-solid fa-eye-slash"></i>'; }
      else { input.type = 'password'; btn.innerHTML = '<i class="fa-solid fa-eye"></i>'; }
    };
    window.resetPasswordAction = async function() {
      const email = prompt('أدخل بريدك الإلكتروني لإرسال رابط إعادة تعيين كلمة المرور:');
      if (!email || !email.trim()) return;
      try {
        const { error } = await window.sb.auth.resetPasswordForEmail(email.trim(), { redirectTo: window.location.origin + '/auth.html' });
        if (error) alert('خطأ: ' + error.message); else alert('تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك بنجاح!');
      } catch (e) { alert('حدث خطأ أثناء إرسال الطلب.'); }
    };
  </script>
</body>
</html>
