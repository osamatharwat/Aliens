<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aliens Space | تسجيل الدخول</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
  <link rel="stylesheet" href="style.css">
  
</head>
<body data-page="auth">
  <div id="particles-js"></div>

<header>
  <div class="nav-container">
    <a href="index.html" class="logo"><span class="ufo-icon">🛸</span> ALIENS</a>
    <nav class="nav-links" id="siteNavLinks"></nav>
    <div class="nav-links" id="siteNavActions"></div>
  </div>
</header>

  <main class="auth-container">
    <div class="auth-box" data-aos="zoom-in">
      <div class="auth-tabs">
        <button class="tab-btn active" type="button" id="loginTabBtn">تسجيل الدخول</button>
        <button class="tab-btn" type="button" id="signupTabBtn">حساب جديد</button>
      </div>

      <form id="loginForm" class="auth-form active-form">
        <h2>أهلاً بك في المركبة 👽</h2>
        <div class="input-group">
          <i class="fa-solid fa-user-astronaut"></i>
          <input type="text" id="loginId" placeholder="البريد الإلكتروني أو اسم المستخدم" autocomplete="username" required>
        </div>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password" required>
        </div>
        <button type="submit" class="cta-btn primary-btn auth-submit">انطلاق 🚀</button>
        <p class="auth-msg" id="loginMsg"></p>
      </form>

      <form id="signupForm" class="auth-form">
        <h2>انضم للفاميليا 💚</h2>
        <div class="input-group">
          <i class="fa-solid fa-id-card"></i>
          <input type="text" id="signupName" placeholder="الاسم بالكامل" autocomplete="name" required>
        </div>
        <div class="input-group">
          <i class="fa-solid fa-at"></i>
          <input type="text" id="signupUsername" placeholder="اسم المستخدم" pattern="[a-zA-Z0-9_]+" title="حروف إنجليزية وأرقام فقط بدون مسافات" autocomplete="username" required>
        </div>
        <div class="input-group">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" autocomplete="email" required>
        </div>
        <div class="input-group">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="signupPassword" placeholder="كلمة المرور (6 أحرف على الأقل)" autocomplete="new-password" minlength="6" required>
        </div>
        <button type="submit" class="cta-btn primary-btn auth-submit">تسجيل البيانات 📝</button>
        <p class="auth-msg" id="signupMsg"></p>
      </form>
    </div>
  </main>

  <footer>© 2026 Aliens Student Activity - Delta University.</footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js/2.0.0/particles.min.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="script.js"></script>
</body>
</html>
